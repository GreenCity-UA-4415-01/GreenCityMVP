# This is a basic workflow to help you get started with Actions

name: CI/CD GreenCity
# Controls when the action will run.

concurrency: Testing

on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master, dev_java21 ]
  pull_request:
    branches: [ master, dev_java21 ]

env:
  repository: greencity
  userRepoName: core
  onbootJarName: app.jar
  dockerRepoName: azkeep/sofserpbl-greencitymvp

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: ubuntu-latest

    # Add permissions to allow the GITHUB_TOKEN to write Check Runs
    permissions:
      checks: write
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    # Fetch depth 0 is needed for correct Sonar analysis
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

    # Checks-out your greencity.repository under $GITHUB_WORKSPACE, so your job can access it

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:

          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

#       - name: Set up Go
#         uses: actions/setup-go@v3
#         with:
#           go-version: 1.18

      - name: Maven Build and Sonar Analysis
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_USER_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_USER }}
          PR_KEY: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        # 1. Build and run tests, which generates the merged jacoco.exec data.
        # 2. Generate the jacoco-aggregate XML report file explicitly.
        # 3. Define the base Sonar command (always required parameters).
        # 4. Conditionally add Pull Request parameters only on pull_request events.
        # 5. Execute the final command - run the Sonar scanner conditionally (PR vs. Push).
        # 6. Change qualitygate.wait to TRUE once we figure out how to properly incorporate incremental test reports.
        run: |
          mvn clean install verify
          echo "Generating jacoco-aggregate report required by Sonar..."
          mvn jacoco:report-aggregate
          SONAR_CMD="mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=GreenCity-UA-4415-01_GreenCityMVP \
            -Dsonar.organization=greencity-ua-4415-01 \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco-aggregate/jacoco.xml \
            -Dsonar.qualitygate.wait=false \
            -Dsonar.ws.timeout=120"
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "--- Adding Pull Request parameters for Sonar Analysis ---"
            SONAR_CMD="$SONAR_CMD -Dsonar.pullrequest.key=$PR_KEY -Dsonar.pullrequest.branch=$PR_BRANCH -Dsonar.pullrequest.base=$PR_BASE"
          else
            echo "--- Running standard Branch Analysis for Sonar (no PR params) ---"
          fi
          
          eval "$SONAR_CMD"

      - name: Test Reporter
        uses: dorny/test-reporter@v1.5.0
        if: success() || failure()
        with:
          name: Tests Report
          path: ${{ env.userRepoName }}/target/surefire-reports/*.xml
          reporter: java-junit

      - name: Rename user jar to app
        run: mv $userRepoName/target/*.jar $userRepoName/target/$onbootJarName

      - name: Set outputs
        run: echo "GITHUB_SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.dockerRepoName }}:test-${{ env.GITHUB_SHA_SHORT }}

#       - name: Kubernetes Set Context
#         uses: Azure/k8s-set-context@v3.0
#         with:
#           kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
#       - name: Set up Postgres
#         run: kubectl scale deploy postgres --replicas=1 -n test
      
#       - name: Kubernetes tests
#         run: |
#           cd chart-test
#           go test -v ./...
      
#       - name: Post Set up Postgres
#         if: success() || failure()
#         run: kubectl scale deploy postgres --replicas=0 -n test

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Deploy 🚀
        if: ${{ github.event_name == 'push' }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GH_USER_TOKEN }}
          BRANCH: gh-pages
          FOLDER: .
          CLEAN: true 
